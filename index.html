<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>msk.wtf</title>
    <script>
      let randomchar = () => {
        return String.fromCharCode(Math.round(Math.random() * 25) + 65);
      };
      let randomstring = (length) => {
        return Array.from({ length: length }, () => randomchar()).join("");
      };
      const HIGHLIGHT_PATTERN = /MSK/g;
      document.addEventListener("DOMContentLoaded", () => {
        let length =
          (document.documentElement.clientWidth *
            document.documentElement.clientHeight) /
          64;
        const content = document.getElementById("content");
        setInterval(() => {
          const text = randomstring(length);
          content.innerHTML = text.replace(
            HIGHLIGHT_PATTERN,
            '<span class="highlight">$&</span>',
          );
        }, 80);
      });
    </script>
    <style>
      #content {
        word-break: break-all;
        width: 120vw;
        height: 120vh;
        position: absolute;
        overflow: hidden;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-rendering: optimizeSpeed;
        background-color: #000;
        color: #111;
      }
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        color: #fff;
        font-size: 16px;
        font-family: monospace;
      }
      #footer {
        position: absolute;
        bottom: 0;
        right: 0;
        margin: 8px;
      }
      .highlight {
        color: #f4f;
      }
    </style>
  </head>
  <body>
    <div id="content"></div>
    <div id="footer">
      wait a thousand years and maybe you'll see the first sentence of hamlet.
      probably not, though.
    </div>
  </body>
</html>
